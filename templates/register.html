<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTrack Pro - Регистрация</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0B0F16 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
        }

        .auth-card {
            background: rgba(18, 22, 30, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .auth-header {
            padding: 40px 30px;
            text-align: center;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(139, 92, 246, 0.2));
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            transform: rotate(45deg);
        }

        .logo-icon i {
            transform: rotate(-45deg);
            font-size: 32px;
            color: white;
        }

        .auth-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #e0e7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .auth-form {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 18px;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            height: 52px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 0 16px 0 50px;
            font-size: 15px;
            color: white;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .input-wrapper input:focus + i {
            color: #3b82f6;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s;
        }

        .password-strength-bar.weak {
            width: 33%;
            background: #ef4444;
        }

        .password-strength-bar.medium {
            width: 66%;
            background: #f59e0b;
        }

        .password-strength-bar.strong {
            width: 100%;
            background: #10b981;
        }

        .password-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .password-hint.valid {
            color: #10b981;
        }

        .password-hint.invalid {
            color: #ef4444;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            color: #ef4444;
            font-size: 14px;
        }

        .error-message.show {
            display: flex;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            color: #10b981;
            font-size: 14px;
        }

        .success-message.show {
            display: flex;
        }

        .submit-btn {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .auth-footer a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .auth-footer a:hover {
            color: #8b5cf6;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">
                    <i class="fas fa-plane"></i>
                </div>
                <h1>Создать аккаунт</h1>
                <p>Присоединяйтесь к SkyTrack Pro</p>
            </div>
            
            <div class="auth-form">
                <div class="error-message" id="errorMessage">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">Ошибка регистрации</span>
                </div>
                
                <div class="success-message" id="successMessage">
                    <i class="fas fa-check-circle"></i>
                    <span id="successText">Успешно! Перенаправление...</span>
                </div>
                
                <form id="registerForm" onsubmit="return false;">
                    <div class="form-group">
                        <label>EMAIL</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="email" placeholder="your@email.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>ИМЯ ПОЛЬЗОВАТЕЛЯ</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username" placeholder="skywatcher" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>ПАРОЛЬ</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="Минимум 6 символов" required>
                        </div>
                        <div class="password-strength">
                            <div id="passwordStrength" class="password-strength-bar"></div>
                        </div>
                        <div class="password-hint" id="lengthHint">
                            <i class="fas fa-circle"></i> Минимум 6 символов
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>ПОДТВЕРДИТЕ ПАРОЛЬ</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="passwordConfirm" placeholder="Повторите пароль" required>
                        </div>
                        <div class="password-hint" id="matchHint">
                            <i class="fas fa-circle"></i> Пароли должны совпадать
                        </div>
                    </div>
                    
                    <button type="button" class="submit-btn" id="submitBtn" onclick="submitRegistration()">
                        <i class="fas fa-user-plus"></i>
                        Зарегистрироваться
                    </button>
                </form>
                
                <div class="auth-footer">
                    Уже есть аккаунт? <a href="/auth/login">Войти</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let passwordValid = false;
        let passwordsMatch = false;

        // Проверка сложности пароля
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthBar = document.getElementById('passwordStrength');
            const lengthHint = document.getElementById('lengthHint');
            
            if (password.length >= 6) {
                lengthHint.innerHTML = '<i class="fas fa-check-circle" style="color: #10b981;"></i> Минимум 6 символов ✓';
                lengthHint.className = 'password-hint valid';
                passwordValid = true;
            } else {
                lengthHint.innerHTML = '<i class="fas fa-times-circle" style="color: #ef4444;"></i> Минимум 6 символов ✗';
                lengthHint.className = 'password-hint invalid';
                passwordValid = false;
            }
            
            if (password.length === 0) {
                strengthBar.style.width = '0';
                strengthBar.className = 'password-strength-bar';
                return;
            }
            
            let strength = 0;
            if (password.length >= 6) strength += 1;
            if (password.length >= 8) strength += 1;
            if (password.match(/[a-z]/)) strength += 1;
            if (password.match(/[A-Z]/)) strength += 1;
            if (password.match(/[0-9]/)) strength += 1;
            if (password.match(/[^a-zA-Z0-9]/)) strength += 1;
            
            strengthBar.className = 'password-strength-bar';
            if (strength < 3) {
                strengthBar.classList.add('weak');
            } else if (strength < 5) {
                strengthBar.classList.add('medium');
            } else {
                strengthBar.classList.add('strong');
            }
            
            checkPasswordMatch();
        }

        // Проверка совпадения паролей
        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('passwordConfirm').value;
            const matchHint = document.getElementById('matchHint');
            
            if (confirm.length === 0) {
                matchHint.innerHTML = '<i class="fas fa-circle" style="color: rgba(255,255,255,0.5);"></i> Пароли должны совпадать';
                matchHint.className = 'password-hint';
                passwordsMatch = false;
            } else if (password === confirm) {
                matchHint.innerHTML = '<i class="fas fa-check-circle" style="color: #10b981;"></i> Пароли совпадают ✓';
                matchHint.className = 'password-hint valid';
                passwordsMatch = true;
            } else {
                matchHint.innerHTML = '<i class="fas fa-times-circle" style="color: #ef4444;"></i> Пароли не совпадают ✗';
                matchHint.className = 'password-hint invalid';
                passwordsMatch = false;
            }
        }

        document.getElementById('password').addEventListener('input', checkPasswordStrength);
        document.getElementById('passwordConfirm').addEventListener('input', checkPasswordMatch);

        // Функция отправки регистрации
        async function submitRegistration() {
            const email = document.getElementById('email').value;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successDiv = document.getElementById('successMessage');
            const submitBtn = document.getElementById('submitBtn');
            
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            
            // Валидация
            if (!email || !username || !password || !passwordConfirm) {
                errorText.textContent = 'Заполните все поля';
                errorDiv.classList.add('show');
                return;
            }
            
            if (!email.includes('@') || !email.includes('.')) {
                errorText.textContent = 'Введите корректный email';
                errorDiv.classList.add('show');
                return;
            }
            
            if (username.length < 3 || username.length > 20) {
                errorText.textContent = 'Имя пользователя должно быть от 3 до 20 символов';
                errorDiv.classList.add('show');
                return;
            }
            
            if (password.length < 6) {
                errorText.textContent = 'Пароль должен быть минимум 6 символов';
                errorDiv.classList.add('show');
                return;
            }
            
            if (password !== passwordConfirm) {
                errorText.textContent = 'Пароли не совпадают';
                errorDiv.classList.add('show');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Регистрация...';
            
            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        email: email,
                        username: username,
                        password: password,
                        password_confirm: passwordConfirm
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successText.textContent = data.message || 'Код отправлен на почту!';
                    successDiv.classList.add('show');
                    
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 2000);
                } else {
                    errorText.textContent = data.error || 'Ошибка регистрации';
                    errorDiv.classList.add('show');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Зарегистрироваться';
                }
            } catch (error) {
                errorText.textContent = 'Ошибка соединения с сервером';
                errorDiv.classList.add('show');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Зарегистрироваться';
            }
        }
    </script>
</body>
</html>
