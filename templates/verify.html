<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SkyTrack Pro - Подтверждение email</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0c14 0%, #1a1f2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .verify-container {
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }

        .verify-card {
            background: rgba(18, 22, 30, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .verify-header {
            padding: 32px 24px;
            text-align: center;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(139, 92, 246, 0.15));
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        .logo-icon i {
            font-size: 32px;
            color: white;
        }

        .verify-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #e0e7ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .verify-header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .verify-content {
            padding: 28px 24px;
        }

        .email-display {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 40px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .email-display i {
            color: #3b82f6;
            font-size: 14px;
        }

        .email-display span {
            font-size: 14px;
            color: white;
            font-weight: 500;
            word-break: break-all;
        }

        .code-title {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .code-inputs {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .code-input {
            width: 48px;
            height: 56px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            color: white;
            transition: all 0.2s ease;
            font-family: 'Inter', monospace;
            outline: none;
        }

        .code-input:focus {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            transform: translateY(-1px);
        }

        .code-input.filled {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }

        .code-input.error {
            border-color: #ef4444;
            animation: shake 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        .timer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .timer-container i {
            color: #3b82f6;
        }

        .timer {
            color: #3b82f6;
            font-weight: 600;
            font-family: monospace;
            font-size: 16px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #ef4444;
            font-size: 13px;
        }

        .error-message.show {
            display: flex;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 40px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #10b981;
            font-size: 13px;
        }

        .success-message.show {
            display: flex;
        }

        .verify-btn {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .verify-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .verify-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .resend-link {
            text-align: center;
            margin: 16px 0;
        }

        .resend-link a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
            cursor: pointer;
        }

        .resend-link a:hover:not(.disabled) {
            color: #3b82f6;
        }

        .resend-link a.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #3b82f6;
        }

        /* Скрываем стрелки в input[type=number] */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        /* Анимация появления */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .verify-card {
            animation: fadeIn 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="verify-card">
            <div class="verify-header">
                <div class="logo-icon">
                    <i class="fas fa-envelope-open-text"></i>
                </div>
                <h1>Проверьте почту</h1>
                <p>Мы отправили код на ваш email</p>
            </div>
            
            <div class="verify-content">
                <div class="email-display" id="emailDisplay">
                    <i class="fas fa-envelope"></i>
                    <span id="emailSpan">{{ email }}</span>
                </div>
                
                <div class="code-title">Введите 5-значный код</div>
                
                <div class="code-inputs">
                    <input type="number" class="code-input" maxlength="1" id="code1" inputmode="numeric" pattern="[0-9]*" autofocus>
                    <input type="number" class="code-input" maxlength="1" id="code2" inputmode="numeric" pattern="[0-9]*">
                    <input type="number" class="code-input" maxlength="1" id="code3" inputmode="numeric" pattern="[0-9]*">
                    <input type="number" class="code-input" maxlength="1" id="code4" inputmode="numeric" pattern="[0-9]*">
                    <input type="number" class="code-input" maxlength="1" id="code5" inputmode="numeric" pattern="[0-9]*">
                </div>
                
                <div class="timer-container">
                    <i class="far fa-clock"></i>
                    <span>Код действителен</span>
                    <span class="timer" id="timer">5:00</span>
                </div>
                
                <div class="error-message" id="errorMessage">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">Неверный код. Попробуйте снова.</span>
                </div>

                <div class="success-message" id="successMessage">
                    <i class="fas fa-check-circle"></i>
                    <span id="successText">Код подтверждён! Перенаправление...</span>
                </div>
                
                <button class="verify-btn" id="verifyBtn" onclick="verifyCode()">
                    <i class="fas fa-check"></i>
                    Подтвердить
                </button>
                
                <div class="resend-link">
                    <a id="resendLink" onclick="resendCode()">
                        <i class="fas fa-redo-alt"></i>
                        Отправить код повторно
                        <span id="resendTimer"></span>
                    </a>
                </div>
                
                <div class="back-link">
                    <a href="/auth/login">
                        <i class="fas fa-arrow-left"></i>
                        Вернуться ко входу
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const email = '{{ email }}';
        let timeLeft = 300; // 5 минут
        let timerInterval;
        let resendCooldown = 60;
        let resendInterval;
        
        const inputs = document.querySelectorAll('.code-input');
        
        // Показываем email
        document.getElementById('emailSpan').textContent = email;

        // Функция обновления таймера
        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                document.getElementById('timer').textContent = '0:00';
            }
        }
        
        // Запускаем таймер
        timerInterval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateTimer();
            }
        }, 1000);
        
        // Обработка ввода в поля
        inputs.forEach((input, index) => {
            // Только цифры
            input.addEventListener('input', function(e) {
                this.value = this.value.replace(/[^0-9]/g, '').slice(0, 1);
                
                if (this.value.length === 1) {
                    this.classList.add('filled');
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    } else {
                        // Автоматическая проверка при вводе последней цифры
                        setTimeout(verifyCode, 100);
                    }
                } else {
                    this.classList.remove('filled');
                }
                
                // Убираем ошибку при вводе
                this.classList.remove('error');
                document.getElementById('errorMessage').classList.remove('show');
            });
            
            // Обработка backspace
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && !this.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
            
            // Разрешаем только цифры
            input.addEventListener('keypress', function(e) {
                if (!/^\d$/.test(e.key)) {
                    e.preventDefault();
                }
            });
            
            // Обработка вставки
            input.addEventListener('paste', function(e) {
                e.preventDefault();
                const paste = e.clipboardData.getData('text');
                if (/^\d{5}$/.test(paste)) {
                    const digits = paste.split('');
                    inputs.forEach((inp, i) => {
                        if (i < digits.length) {
                            inp.value = digits[i];
                            inp.classList.add('filled');
                        }
                    });
                    setTimeout(verifyCode, 100);
                }
            });
        });

        // Функция проверки кода
        async function verifyCode() {
            const code = Array.from(inputs).map(i => i.value).join('');
            
            if (code.length !== 5) {
                showError('Введите все 5 цифр');
                return;
            }
            
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const verifyBtn = document.getElementById('verifyBtn');
            
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Проверка...';
            
            try {
                const response = await fetch('/auth/verify', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, code})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successDiv.classList.add('show');
                    
                    inputs.forEach(input => {
                        input.style.borderColor = '#10b981';
                        input.disabled = true;
                    });
                    
                    setTimeout(() => {
                        window.location.href = data.redirect;
                    }, 1500);
                } else {
                    showError(data.error || 'Неверный код');
                    inputs.forEach(input => {
                        input.classList.add('error');
                        input.value = '';
                        input.classList.remove('filled');
                    });
                    inputs[0].focus();
                    verifyBtn.disabled = false;
                    verifyBtn.innerHTML = '<i class="fas fa-check"></i> Подтвердить';
                }
            } catch (error) {
                showError('Ошибка соединения');
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = '<i class="fas fa-check"></i> Подтвердить';
            }
        }

        // Функция повторной отправки кода
        async function resendCode() {
            const link = document.getElementById('resendLink');
            const timerSpan = document.getElementById('resendTimer');
            
            link.classList.add('disabled');
            
            try {
                const response = await fetch('/auth/resend-code', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email})
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Сбрасываем таймер
                    timeLeft = 300;
                    updateTimer();
                    
                    // Очищаем поля
                    inputs.forEach(i => {
                        i.value = '';
                        i.classList.remove('error', 'filled');
                        i.disabled = false;
                        i.style.borderColor = '';
                    });
                    inputs[0].focus();
                    
                    // Прячем ошибки
                    document.getElementById('errorMessage').classList.remove('show');
                    
                    showSuccess('Новый код отправлен на почту!');
                    
                    // Запускаем кулдаун на повторную отправку
                    let cooldown = 60;
                    if (resendInterval) clearInterval(resendInterval);
                    
                    resendInterval = setInterval(() => {
                        cooldown--;
                        if (cooldown <= 0) {
                            clearInterval(resendInterval);
                            link.classList.remove('disabled');
                            timerSpan.textContent = '';
                        } else {
                            timerSpan.textContent = `(${cooldown}с)`;
                        }
                    }, 1000);
                } else {
                    link.classList.remove('disabled');
                    showError('Ошибка при отправке');
                }
            } catch (error) {
                console.error('Resend error:', error);
                link.classList.remove('disabled');
                showError('Ошибка соединения');
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            document.getElementById('errorText').textContent = message;
            errorDiv.classList.add('show');
            
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 3000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            document.getElementById('successText').textContent = message;
            successDiv.classList.add('show');
            
            setTimeout(() => {
                successDiv.classList.remove('show');
            }, 2000);
        }

        // Enter для подтверждения
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                verifyCode();
            }
        });

        // Фокус на первое поле
        window.addEventListener('load', () => {
            inputs[0].focus();
        });
    </script>
</body>
</html>
