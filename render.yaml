services:
  - type: web
    name: skytrack-pro
    runtime: python
    region: frankfurt  # Ближайший к России регион
    plan: free
    branch: main
    buildCommand: |
      # Обновляем pip и базовые инструменты
      python -m pip install --upgrade pip
      pip install --upgrade setuptools wheel
      
      # Устанавливаем зависимости с очисткой кэша
      pip install --no-cache-dir -r requirements.txt
      
      # Проверка установленных пакетов
      pip list
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: 1
      - key: FLASK_DEBUG
        value: false
      
      # База данных Supabase
      - key: DATABASE_URL
        sync: false  # Будет запрошено при деплое
      
      # OpenSky API
      - key: OPENSKY_CLIENT_ID
        value: lakewood-api-client
      - key: OPENSKY_CLIENT_SECRET
        value: w2fXk8ABuyzarOWICfckGiYO1KNPzgwG
      
      # Email настройки (mail.ru)
      - key: EMAIL_HOST
        value: smtp.mail.ru
      - key: EMAIL_PORT
        value: 465
      - key: EMAIL_USER
        value: verification@skytrack.c6t.ru
      - key: EMAIL_PASSWORD
        value: HdbS0eCsnHu2amvqPv9g
      - key: EMAIL_FROM
        value: verification@skytrack.c6t.ru
      
      # Безопасность
      - key: SECRET_KEY
        generateValue: true  # Render сгенерирует случайный ключ
      
      # Google Maps (нужно будет добавить)
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      
      # Отключаем проверку версии pip
      - key: PIP_DISABLE_PIP_VERSION_CHECK
        value: 1
      
      # Настройки Gunicorn
      - key: WEB_CONCURRENCY
        value: 2
